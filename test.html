<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test - Derecho y Empresa</title>
  <link rel="stylesheet" href="estilos.css">
  <style>
    .pregunta-box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
    }

    .pregunta-numero {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 10px;
    }

    .pregunta-texto {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 20px;
      color: #1e3a5f;
    }

    .opciones {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .opcion {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 14px;
      text-align: left;
      font-size: 1rem;
      cursor: pointer;
      background-color: #eef3fb;
      transition: 0.3s;
    }

    .opcion:hover {
      background-color: #dbe7f8;
    }

    .opcion.correcta {
      background-color: #cfeecf;
      border: 2px solid #4caf50;
    }

    .opcion.incorrecta {
      background-color: #f8d7da;
      border: 2px solid #dc3545;
    }

    .resultado {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }

    .resultado.ok {
      background-color: #e8f5e9;
      border-left: 5px solid #4caf50;
    }

    .resultado.error {
      background-color: #fdecea;
      border-left: 5px solid #dc3545;
    }

    .explicacion {
      margin-top: 8px;
    }

    .barra-superior {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .mini-tarjeta {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      flex: 1;
      min-width: 200px;
    }

    .acciones-test {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .boton-secundario {
      display: inline-block;
      text-align: center;
      text-decoration: none;
      background-color: #6c757d;
      color: white;
      padding: 14px 18px;
      border-radius: 10px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .boton-secundario:hover {
      background-color: #565e64;
    }

    .oculto {
      display: none;
    }

    .final-box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .barra-progreso {
      width: 100%;
      height: 14px;
      background-color: #dfe7f3;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }

    .barra-progreso-interna {
      height: 100%;
      width: 0%;
      background-color: #2f6fed;
      transition: width 0.3s ease;
    }

    @media (max-width: 600px) {
      .pregunta-texto {
        font-size: 1.05rem;
      }

      .opcion {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Test de Derecho y Empresa</h1>
    <p>Practica y corrige tus errores al momento</p>
  </header>

  <main class="contenedor">
    <section class="barra-superior">
      <div class="mini-tarjeta">
        <h2>Progreso</h2>
        <p id="progreso">Pregunta 1 de 40</p>
        <div class="barra-progreso">
          <div class="barra-progreso-interna" id="barraProgreso"></div>
        </div>
      </div>
      <div class="mini-tarjeta">
        <h2>Aciertos</h2>
        <p id="marcador">0</p>
      </div>
    </section>

    <section class="pregunta-box" id="quizBox">
      <p class="pregunta-numero" id="numeroPregunta">Pregunta 1</p>
      <div class="pregunta-texto" id="textoPregunta"></div>

      <div class="opciones" id="opciones"></div>

      <div class="resultado" id="resultado"></div>

      <div class="acciones-test">
        <button class="boton oculto" id="btnSiguiente">Siguiente pregunta</button>
        <a href="index.html" class="boton-secundario">Volver al inicio</a>
      </div>
    </section>

    <section class="final-box oculto" id="finalBox">
      <h2>Has terminado el test</h2>
      <p id="notaFinal"></p>
      <div class="acciones-test" style="justify-content:center;">
        <button class="boton" id="btnReiniciar">Reiniciar test</button>
        <a href="resumen.html" class="boton">Ir al resumen</a>
        <a href="esquema.html" class="boton">Ir al esquema</a>
      </div>
    </section>
  </main>

    let preguntas = [];
    let indiceActual = 0;
    let aciertos = 0;
    let respondida = false;

    const numeroPregunta = document.getElementById("numeroPregunta");
    const textoPregunta = document.getElementById("textoPregunta");
    const opcionesDiv = document.getElementById("opciones");
    const resultadoDiv = document.getElementById("resultado");
    const progreso = document.getElementById("progreso");
    const marcador = document.getElementById("marcador");
    const btnSiguiente = document.getElementById("btnSiguiente");
    const quizBox = document.getElementById("quizBox");
    const finalBox = document.getElementById("finalBox");
    const notaFinal = document.getElementById("notaFinal");
    const btnReiniciar = document.getElementById("btnReiniciar");
    const barraProgreso = document.getElementById("barraProgreso");

    function mezclarArray(array) {
      const copia = [...array];
      for (let i = copia.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copia[i], copia[j]] = [copia[j], copia[i]];
      }
      return copia;
    }

    function iniciarTest() {
      preguntas = mezclarArray(bancoPreguntas);
      indiceActual = 0;
      aciertos = 0;
      respondida = false;
      marcador.textContent = "0";
      finalBox.classList.add("oculto");
      quizBox.classList.remove("oculto");
      cargarPregunta();
    }

    function actualizarBarra() {
      const porcentaje = ((indiceActual) / preguntas.length) * 100;
      barraProgreso.style.width = `${porcentaje}%`;
    }

    function cargarPregunta() {
      respondida = false;
      resultadoDiv.style.display = "none";
      resultadoDiv.className = "resultado";
      btnSiguiente.classList.add("oculto");

      const actual = preguntas[indiceActual];

      numeroPregunta.textContent = `Pregunta ${indiceActual + 1}`;
      progreso.textContent = `Pregunta ${indiceActual + 1} de ${preguntas.length}`;
      textoPregunta.textContent = actual.pregunta;
      opcionesDiv.innerHTML = "";
      actualizarBarra();

      actual.opciones.forEach((opcion, i) => {
        const boton = document.createElement("button");
        boton.classList.add("opcion");
        boton.textContent = opcion;
        boton.addEventListener("click", () => responder(i, boton));
        opcionesDiv.appendChild(boton);
      });
    }

    function responder(indiceSeleccionado, botonPulsado) {
      if (respondida) return;
      respondida = true;

      const actual = preguntas[indiceActual];
      const botones = document.querySelectorAll(".opcion");

      botones.forEach((btn, i) => {
        btn.disabled = true;
        if (i === actual.correcta) {
          btn.classList.add("correcta");
        }
      });

      if (indiceSeleccionado === actual.correcta) {
        aciertos++;
        marcador.textContent = aciertos;
        botonPulsado.classList.add("correcta");
        resultadoDiv.classList.add("ok");
        resultadoDiv.innerHTML = `
          <strong>Correcto.</strong>
          <p class="explicacion">${actual.explicacion}</p>
        `;
      } else {
        botonPulsado.classList.add("incorrecta");
        resultadoDiv.classList.add("error");
        resultadoDiv.innerHTML = `
          <strong>Incorrecto.</strong>
          <p>La respuesta correcta es: <strong>${actual.opciones[actual.correcta]}</strong>.</p>
          <p class="explicacion">${actual.explicacion}</p>
        `;
      }

      resultadoDiv.style.display = "block";
      btnSiguiente.classList.remove("oculto");
    }

    btnSiguiente.addEventListener("click", () => {
      indiceActual++;
      if (indiceActual < preguntas.length) {
        cargarPregunta();
      } else {
        mostrarFinal();
      }
    });

    function mostrarFinal() {
      quizBox.classList.add("oculto");
      finalBox.classList.remove("oculto");
      barraProgreso.style.width = "100%";

      const total = preguntas.length;
      const porcentaje = Math.round((aciertos / total) * 100);

      let mensaje = "";
      if (porcentaje >= 90) {
        mensaje = "Excelente. Llevas el tema muy bien preparado.";
      } else if (porcentaje >= 75) {
        mensaje = "Muy buen trabajo. Te conviene repasar solo algunos detalles.";
      } else if (porcentaje >= 60) {
        mensaje = "Vas bien, pero aún necesitas afianzar varios apartados.";
      } else {
        mensaje = "Necesitas repasar el resumen y el esquema antes de volver a intentarlo.";
      }

      notaFinal.innerHTML = `
        Has acertado <strong>${aciertos}</strong> de <strong>${total}</strong> preguntas
        (<strong>${porcentaje}%</strong>).<br><br>${mensaje}
      `;
    }

    btnReiniciar.addEventListener("click", iniciarTest);

    iniciarTest();
  </script>
